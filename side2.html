<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helt Nils – Side 2</title>

  <style>
    :root {
      --cell: 38px;
      --grid-line: rgba(0, 0, 0, 0.14);
      --paper: #f8f7f2;
      --ink: #111;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #e9e9eb;
      font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .page {
      width: 1180px;
      min-height: 920px;
      background-color: var(--paper);
      background-image:
        linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
      background-size: var(--cell) var(--cell);
      position: relative;
      padding: 70px 70px 90px;
      overflow: hidden;
    }

    .page.shake {
      animation: pageShake 0.45s ease;
    }

    @keyframes pageShake {
      0% { transform: translate(0, 0); }
      20% { transform: translate(-3px, 1px); }
      40% { transform: translate(3px, -2px); }
      60% { transform: translate(-2px, 2px); }
      80% { transform: translate(2px, -1px); }
      100% { transform: translate(0, 0); }
    }

    .top-line {
      position: absolute;
      top: 30px;
      left: 0;
      right: 0;
      border-top: 2px solid #111;
      z-index: 1;
    }

    .menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 40px;
      gap: 42px;
      position: relative;
      z-index: 2;
    }

    .subtitle {
      font-size: 2.6rem;
      color: var(--ink);
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .ruteord {
      display: inline-grid;
      grid-auto-flow: column;
      grid-auto-columns: var(--cell);
      align-items: center;
      justify-items: center;
      min-height: var(--cell);
      padding: 0 16px;
      border-radius: 18px;
      color: var(--ink);
      font-size: 2rem;
      text-decoration: none;
      position: relative;
      z-index: 2;
    }

    .ruteord span {
      width: var(--cell);
      height: var(--cell);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .title-pill {
      background: #aebfe8;
      margin-bottom: 8px;
      min-width: 880px;
      justify-content: center;
    }

    .level1 { background: #efe96c; }
    .level2 { background: #d9eb85; }
    .level3 { background: #f1a39d; }
    .level4 { background: #d48be9; }

    .prev,
    .next {
      position: absolute;
      top: 640px;
      font-size: 2rem;
      border: 3px solid #111;
      border-radius: 999px;
      padding: 10px 28px;
      text-decoration: none;
      color: #111;
      background: white;
      z-index: 2;
      transform: rotate(-2deg);
    }

    .prev { left: 90px; }
    .next { right: 70px; }

    .page-number {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 730px;
      font-size: 2rem;
      z-index: 2;
    }

    .flower {
      position: absolute;
      width: 82px;
      height: 82px;
      z-index: 2;
      pointer-events: none;
    }

    .flower-left {
      top: 48px;
      left: 46px;
    }

    .flower-right {
      top: 48px;
      right: 46px;
    }

    .secret-gravity {
      position: absolute;
      top: 0;
      right: 0;
      width: 120px;
      height: 120px;
      background: transparent;
      border: none;
      outline: none;
      box-shadow: none;
      appearance: none;
      -webkit-appearance: none;
      padding: 0;
      margin: 0;
      z-index: 20;
      cursor: pointer;
      opacity: 0;
    }

    .secret-gravity:focus-visible {
      opacity: 0.08;
      outline: 2px dashed #111;
      outline-offset: -4px;
    }

    .gravity-piece {
      position: absolute;
      pointer-events: none;
      white-space: pre;
      color: #111;
      line-height: 1;
      z-index: 100;
      will-change: transform, top, left;
    }

    @media (max-width: 900px) {
      :root {
        --cell: 30px;
      }

      .page {
        width: 100%;
        min-height: 100vh;
        padding: 60px 20px 70px;
      }

      .menu {
        gap: 30px;
      }

      .ruteord {
        font-size: 1.35rem;
        padding: 0 10px;
      }

      .title-pill {
        min-width: auto;
        width: calc(100% - 60px);
      }

      .subtitle {
        font-size: 2rem;
      }

      .prev,
      .next {
        position: static;
        display: table;
        margin: 20px auto 10px;
        font-size: 1.5rem;
      }

      .page-number {
        position: static;
        transform: none;
        text-align: center;
        margin-top: 22px;
        font-size: 1.5rem;
      }

      .flower {
        width: 62px;
        height: 62px;
      }

      .secret-gravity {
        width: 90px;
        height: 90px;
      }
    }
  </style>
</head>
<body>

<div class="page" id="page">
  <button class="secret-gravity" id="secretGravity" aria-label="Hemmelig gravity-knapp"></button>

  <div class="top-line"></div>

  <svg class="flower flower-left" viewBox="0 0 100 100" aria-hidden="true">
    <ellipse cx="22" cy="26" rx="10" ry="20" fill="#8fd39b" transform="rotate(-50 22 26)"></ellipse>
    <ellipse cx="22" cy="58" rx="10" ry="20" fill="#8fd39b" transform="rotate(40 22 58)"></ellipse>
    <circle cx="54" cy="42" r="13" fill="#f4c4b8"></circle>
    <circle cx="42" cy="30" r="13" fill="#f7d0c7"></circle>
    <circle cx="67" cy="30" r="13" fill="#f7d0c7"></circle>
    <circle cx="42" cy="55" r="13" fill="#f7d0c7"></circle>
    <circle cx="67" cy="55" r="13" fill="#f7d0c7"></circle>
    <circle cx="54" cy="42" r="6" fill="#f2f0c6"></circle>
  </svg>

  <svg class="flower flower-right" viewBox="0 0 100 100" aria-hidden="true">
    <ellipse cx="78" cy="26" rx="10" ry="20" fill="#8fd39b" transform="rotate(50 78 26)"></ellipse>
    <ellipse cx="78" cy="58" rx="10" ry="20" fill="#8fd39b" transform="rotate(-40 78 58)"></ellipse>
    <circle cx="46" cy="42" r="13" fill="#f4c4b8"></circle>
    <circle cx="34" cy="30" r="13" fill="#f7d0c7"></circle>
    <circle cx="59" cy="30" r="13" fill="#f7d0c7"></circle>
    <circle cx="34" cy="55" r="13" fill="#f7d0c7"></circle>
    <circle cx="59" cy="55" r="13" fill="#f7d0c7"></circle>
    <circle cx="46" cy="42" r="6" fill="#f2f0c6"></circle>
  </svg>

  <div class="menu">
    <div id="title" class="ruteord title-pill"></div>
    <div class="subtitle" id="subtitle">Algebra</div>

    <a class="ruteord level1" href="algebra1.html" id="btn1"></a>
    <a class="ruteord level2" href="algebra2.html" id="btn2"></a>
    <a class="ruteord level3" href="algebra3.html" id="btn3"></a>
    <a class="ruteord level4" href="regnerekkefolge.html" id="btn4"></a>
  </div>

  <a class="prev" href="index.html" id="prevLink">← Forrige</a>
  <a class="next" href="side3.html" id="nextLink">Neste →</a>

  <div class="page-number" id="pageNumber">Side 2</div>
</div>

<script>
  function settRuteord(id, tekst) {
    const el = document.getElementById(id);
    el.innerHTML = "";
    for (const tegn of tekst) {
      const span = document.createElement("span");
      span.textContent = tegn === " " ? " " : tegn;
      el.appendChild(span);
    }
  }

  settRuteord("title", "Helt Nils lekser");
  settRuteord("btn1", "1 Nivå 1");
  settRuteord("btn2", "2 Nivå 2");
  settRuteord("btn3", "3 Nivå 3");
  settRuteord("btn4", "Regnerekkefølge");

  let gravityStarted = false;

  function rand(min, max) {
    return Math.random() * (max - min) + min;
  }

  function makePiece(text, x, y, styles) {
    const piece = document.createElement("span");
    piece.className = "gravity-piece";
    piece.textContent = text;
    piece.style.left = `${x}px`;
    piece.style.top = `${y}px`;
    piece.style.fontSize = styles.fontSize;
    piece.style.fontFamily = styles.fontFamily;
    piece.style.fontWeight = styles.fontWeight;
    piece.style.color = styles.color;
    piece.style.letterSpacing = styles.letterSpacing;
    piece.style.zIndex = styles.zIndex || 100;
    document.getElementById("page").appendChild(piece);
    return piece;
  }

  function splitTextElement(el, pieces, pageRect) {
    const text = el.textContent;
    if (!text.trim()) {
      el.style.visibility = "hidden";
      return;
    }

    const rect = el.getBoundingClientRect();
    const styles = getComputedStyle(el);

    const measurer = document.createElement("span");
    measurer.style.position = "absolute";
    measurer.style.visibility = "hidden";
    measurer.style.whiteSpace = "pre";
    measurer.style.fontSize = styles.fontSize;
    measurer.style.fontFamily = styles.fontFamily;
    measurer.style.fontWeight = styles.fontWeight;
    measurer.style.letterSpacing = styles.letterSpacing;
    document.body.appendChild(measurer);

    let cursorX = rect.left - pageRect.left;

    for (const ch of Array.from(text)) {
      measurer.textContent = ch === " " ? "\u00A0" : ch;
      const w = Math.max(measurer.getBoundingClientRect().width, 8);

      if (ch !== " ") {
        const piece = makePiece(
          ch,
          cursorX,
          rect.top - pageRect.top,
          styles
        );

        pieces.push({
          el: piece,
          x: cursorX,
          y: rect.top - pageRect.top,
          vx: rand(-2.2, 2.2),
          vy: rand(-1.5, 0.5),
          rotation: rand(-10, 10),
          vr: rand(-8, 8),
          bounce: 0.35
        });
      }

      cursorX += w;
    }

    document.body.removeChild(measurer);
    el.style.visibility = "hidden";
  }

  function splitWholeElement(el, pieces, pageRect) {
    const rect = el.getBoundingClientRect();
    const clone = el.cloneNode(true);
    const styles = getComputedStyle(el);

    clone.className = "gravity-piece";
    clone.style.left = `${rect.left - pageRect.left}px`;
    clone.style.top = `${rect.top - pageRect.top}px`;
    clone.style.margin = "0";
    clone.style.pointerEvents = "none";
    clone.style.zIndex = 99;
    clone.style.font = styles.font;
    clone.style.color = styles.color;
    clone.style.background = styles.backgroundColor;
    clone.style.border = styles.border;
    clone.style.borderRadius = styles.borderRadius;
    clone.style.padding = styles.padding;
    clone.style.display = getComputedStyle(el).display === "inline-flex" ? "inline-flex" : "block";
    clone.style.alignItems = "center";
    clone.style.justifyContent = "center";
    clone.style.textDecoration = "none";
    clone.style.transform = getComputedStyle(el).transform === "none" ? "rotate(-2deg)" : getComputedStyle(el).transform;

    document.getElementById("page").appendChild(clone);

    pieces.push({
      el: clone,
      x: rect.left - pageRect.left,
      y: rect.top - pageRect.top,
      vx: rand(-1.6, 1.6),
      vy: rand(-1.2, 0.3),
      rotation: rand(-5, 5),
      vr: rand(-4, 4),
      bounce: 0.28
    });

    el.style.visibility = "hidden";
  }

  function splitFlower(el, pieces, pageRect) {
    const rect = el.getBoundingClientRect();
    const clone = el.cloneNode(true);

    clone.classList.add("gravity-piece");
    clone.style.left = `${rect.left - pageRect.left}px`;
    clone.style.top = `${rect.top - pageRect.top}px`;
    clone.style.width = `${rect.width}px`;
    clone.style.height = `${rect.height}px`;
    clone.style.zIndex = 98;
    clone.style.pointerEvents = "none";

    document.getElementById("page").appendChild(clone);

    pieces.push({
      el: clone,
      x: rect.left - pageRect.left,
      y: rect.top - pageRect.top,
      vx: rand(-1.8, 1.8),
      vy: rand(-1.5, 0.4),
      rotation: rand(-12, 12),
      vr: rand(-5, 5),
      bounce: 0.22
    });

    el.style.visibility = "hidden";
  }

  function turnOnGravity() {
    if (gravityStarted) return;
    gravityStarted = true;

    const page = document.getElementById("page");
    const pageRect = page.getBoundingClientRect();
    const floor = page.clientHeight - 8;
    const pieces = [];

    page.classList.add("shake");
    setTimeout(() => page.classList.remove("shake"), 450);

    const textTargets = [
      ...document.querySelectorAll(".ruteord span"),
      document.getElementById("subtitle"),
      document.getElementById("pageNumber")
    ];

    textTargets.forEach(el => splitTextElement(el, pieces, pageRect));

    [document.getElementById("prevLink"), document.getElementById("nextLink")].forEach(el => {
      splitWholeElement(el, pieces, pageRect);
    });

    document.querySelectorAll(".flower").forEach(el => {
      splitFlower(el, pieces, pageRect);
    });

    let last = null;

    function animate(t) {
      if (!last) last = t;
      const dt = Math.min((t - last) / 16.666, 2);
      last = t;

      for (const p of pieces) {
        p.vy += 0.42 * dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.rotation += p.vr * dt;

        const h = p.el.offsetHeight || 24;
        const w = p.el.offsetWidth || 20;

        if (p.y + h >= floor) {
          p.y = floor - h;
          p.vy *= -p.bounce;
          p.vx *= 0.97;
          p.vr *= 0.96;

          if (Math.abs(p.vy) < 0.45) p.vy = 0;
          if (Math.abs(p.vx) < 0.02) p.vx = 0;
        }

        if (p.x < 0) {
          p.x = 0;
          p.vx *= -0.5;
        }

        if (p.x + w > page.clientWidth) {
          p.x = page.clientWidth - w;
          p.vx *= -0.5;
        }

        p.el.style.left = `${p.x}px`;
        p.el.style.top = `${p.y}px`;
        p.el.style.transform = `rotate(${p.rotation}deg)`;
      }

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  }

  const gravityBtn = document.getElementById("secretGravity");
  gravityBtn.addEventListener("click", turnOnGravity);
  gravityBtn.addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      turnOnGravity();
    }
  });
</script>

</body>
</html>
