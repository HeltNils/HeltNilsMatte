<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helt Nils – Side 2</title>

<style>

:root{
--cell:38px;
--grid-line:rgba(0,0,0,0.14);
--paper:#f8f7f2;
--ink:#111;
}

*{box-sizing:border-box;}

body{
margin:0;
background:#e9e9eb;
font-family:"Comic Sans MS","Trebuchet MS",sans-serif;
display:flex;
justify-content:center;
padding:24px;
}

.page{
width:1180px;
min-height:920px;
background-color:var(--paper);
background-image:
linear-gradient(to right,var(--grid-line) 1px,transparent 1px),
linear-gradient(to bottom,var(--grid-line) 1px,transparent 1px);
background-size:var(--cell) var(--cell);
position:relative;
padding:70px 70px 90px;
overflow:hidden;
}

.top-line{
position:absolute;
top:30px;
left:0;
right:0;
border-top:2px solid #111;
}

.menu{
display:flex;
flex-direction:column;
align-items:center;
margin-top:40px;
gap:42px;
}

.subtitle{
font-size:2.6rem;
color:var(--ink);
text-align:center;
}

.ruteord{
display:inline-grid;
grid-auto-flow:column;
grid-auto-columns:var(--cell);
align-items:center;
justify-items:center;
min-height:var(--cell);
padding:0 16px;
border-radius:18px;
color:var(--ink);
font-size:2rem;
text-decoration:none;
}

/* HOVER EFFEKT */

.level1,
.level2,
.level3,
.level4,
.prev,
.next{
transition:transform 0.18s ease, box-shadow 0.18s ease;
}

.level1:hover,
.level2:hover,
.level3:hover,
.level4:hover,
.prev:hover,
.next:hover{
transform:scale(1.06);
box-shadow:0 6px 14px rgba(0,0,0,0.08);
}

.ruteord span{
width:var(--cell);
height:var(--cell);
display:flex;
align-items:center;
justify-content:center;
}

.title-pill{
background:#aebfe8;
margin-bottom:8px;
min-width:880px;
justify-content:center;
}

.level1{background:#efe96c;}
.level2{background:#d9eb85;}
.level3{background:#f1a39d;}
.level4{background:#d48be9;}

.prev,
.next{
position:absolute;
top:640px;
font-size:2rem;
border:3px solid #111;
border-radius:999px;
padding:10px 28px;
text-decoration:none;
color:#111;
background:white;
}

.prev{left:90px;}
.next{right:70px;}

.page-number{
position:absolute;
left:50%;
transform:translateX(-50%);
top:730px;
font-size:2rem;
}

.flower{
position:absolute;
width:82px;
height:82px;
}

.flower-left{
top:48px;
left:46px;
}

.flower-right{
top:48px;
right:46px;
}

/* USYNLIG GRAVITY KNAPP */

.secret-gravity{
position:absolute;
top:0;
right:0;
width:120px;
height:120px;
background:transparent;
border:none;
opacity:0;
z-index:10;
}

/* USYNLIG KLASSEKART */

.secret-klassekart{
position:absolute;
left:calc(var(--cell) * 1);
bottom:calc(var(--cell) * 1);
width:var(--cell);
height:var(--cell);
background:transparent;
border:none;
opacity:0;
z-index:10;
}

.gravity-letter{
position:absolute;
pointer-events:none;
font-family:"Comic Sans MS","Trebuchet MS",sans-serif;
font-size:2rem;
}

</style>
</head>

<body>

<div class="page" id="page">

<button class="secret-gravity" onclick="turnOnGravity()"></button>

<div class="top-line"></div>

<svg class="flower flower-left" viewBox="0 0 100 100">
<ellipse cx="22" cy="26" rx="10" ry="20" fill="#8fd39b"/>
<ellipse cx="22" cy="58" rx="10" ry="20" fill="#8fd39b"/>
<circle cx="54" cy="42" r="13" fill="#f4c4b8"/>
</svg>

<svg class="flower flower-right" viewBox="0 0 100 100">
<ellipse cx="78" cy="26" rx="10" ry="20" fill="#8fd39b"/>
<ellipse cx="78" cy="58" rx="10" ry="20" fill="#8fd39b"/>
<circle cx="46" cy="42" r="13" fill="#f4c4b8"/>
</svg>

<div class="menu">

<div id="title" class="ruteord title-pill"></div>

<div class="subtitle">Algebra</div>

<a class="ruteord level1" href="algebra1.html" id="btn1"></a>
<a class="ruteord level2" href="algebra2.html" id="btn2"></a>
<a class="ruteord level3" href="algebra3.html" id="btn3"></a>
<a class="ruteord level4" href="regnerekkefolge.html" id="btn4"></a>

</div>

<a class="prev" href="index.html">← Forrige</a>
<a class="next" href="side3.html">Neste →</a>

<div class="page-number">Side 2</div>

<a class="secret-klassekart" href="klassekart.html"></a>

</div>

<script>

function settRuteord(id,tekst){

const el=document.getElementById(id)
el.innerHTML=""

for(const tegn of tekst){

const span=document.createElement("span")
span.textContent=tegn
el.appendChild(span)

}

}

settRuteord("title","Helt Nils lekser")
settRuteord("btn1","1 Nivå 1")
settRuteord("btn2","2 Nivå 2")
settRuteord("btn3","3 Nivå 3")
settRuteord("btn4","Regnerekkefølge")

let gravityStarted=false

function turnOnGravity(){

if(gravityStarted)return
gravityStarted=true

const elements=document.querySelectorAll(".ruteord span,.subtitle,.page-number,.prev,.next")

let pieces=[]

elements.forEach(el=>{

const rect=el.getBoundingClientRect()
const text=el.textContent

for(let i=0;i<text.length;i++){

const span=document.createElement("span")
span.className="gravity-letter"
span.textContent=text[i]

span.style.left=rect.left+(i*18)+"px"
span.style.top=rect.top+"px"

document.body.appendChild(span)

pieces.push({
el:span,
x:rect.left+(i*18),
y:rect.top,
vy:0,
vx:(Math.random()-0.5)*2
})

}

el.style.visibility="hidden"

})

function animate(){

pieces.forEach(p=>{

p.vy+=0.4
p.y+=p.vy
p.x+=p.vx

p.el.style.left=p.x+"px"
p.el.style.top=p.y+"px"

})

requestAnimationFrame(animate)

}

animate()

}

</script>

</body>
</html>
