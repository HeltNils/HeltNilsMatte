<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helt Nils lekser – Regnerekkefølge</title>
  <style>
    :root {
      --cell: 38px;
      --grid-line: rgba(0, 0, 0, 0.14);
      --paper: #f8f7f2;
      --ink: #111;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #e9e9eb;
      font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .page {
      width: 1180px;
      min-height: 920px;
      background-color: var(--paper);
      background-image:
        linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
      background-size: var(--cell) var(--cell);
      position: relative;
      padding: 70px 70px 90px;
      overflow: hidden;
    }

    .top-line {
      position: absolute;
      top: 30px;
      left: 0;
      right: 0;
      border-top: 2px solid #111;
    }

    .flower {
      position: absolute;
      width: 82px;
      height: 82px;
    }

    .flower-left {
      top: 48px;
      left: 46px;
    }

    .flower-right {
      top: 48px;
      right: 46px;
    }

    .controls {
      position: absolute;
      top: 46px;
      right: 140px;
      display: flex;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 1rem;
      cursor: pointer;
      background: #333;
      color: white;
    }

    .ruteord {
      display: inline-grid;
      grid-auto-flow: column;
      grid-auto-columns: var(--cell);
      align-items: center;
      justify-items: center;
      min-height: var(--cell);
      padding: 0 16px;
      border-radius: 18px;
      color: var(--ink);
      font-size: 2rem;
      line-height: 1;
      white-space: nowrap;
    }

    .ruteord span {
      width: var(--cell);
      height: var(--cell);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .title-pill {
      background: #aebfe8;
      margin-top: 40px;
      margin-left: 220px;
    }

    .subtitle-pill {
      background: #aebfe8;
      margin-top: 55px;
      margin-left: 430px;
    }

    .pemdas-wrap {
      margin-top: 70px;
      margin-left: 0;
      display: flex;
      align-items: flex-start;
      gap: 18px;
    }

    .pemdas-letters {
      display: grid;
      grid-template-rows: repeat(6, var(--cell));
      width: var(--cell);
    }

    .pemdas-letters div {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      border-radius: 10px;
    }

    .p-red { background: #f4a39c; }
    .e-peach { background: #f4a39c; }
    .m-blue { background: #aebfe8; }
    .d-blue { background: #aebfe8; }
    .a-green { background: #d8eb84; }
    .s-green { background: #d8eb84; }

    .pemdas-text {
      display: grid;
      grid-template-rows: repeat(6, var(--cell));
      font-size: 2rem;
    }

    .pemdas-text div {
      display: flex;
      align-items: center;
    }

    .task-title {
      background: #d48be9;
      margin-top: 95px;
      margin-left: 200px;
    }

    .task-area {
      margin-top: 70px;
      margin-left: 210px;
      font-size: 2.2rem;
      min-height: 120px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
    }

    .expr {
      display: inline-flex;
      align-items: flex-end;
      flex-wrap: wrap;
      row-gap: 10px;
    }

    .token {
      min-width: calc(var(--cell) * 0.8);
      text-align: center;
      display: inline-block;
    }

    .pow {
      position: relative;
      display: inline-block;
      padding-right: 10px;
      margin-right: 10px;
    }

    .pow .base {
      display: inline-block;
    }

    .pow .exp {
      position: absolute;
      top: -22px;
      right: -8px;
      font-size: 1.2rem;
      line-height: 1;
    }

    .answer-equals {
      margin-left: 10px;
    }

    .back-link {
      position: absolute;
      left: 40px;
      top: 40px;
      background: white;
      color: #111;
      text-decoration: none;
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 1.1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    @media (max-width: 900px) {
      :root {
        --cell: 28px;
      }

      .page {
        width: 100%;
        min-height: 100vh;
        padding: 70px 20px 70px;
      }

      .title-pill,
      .subtitle-pill,
      .task-title,
      .task-area {
        margin-left: 0;
      }

      .pemdas-wrap {
        flex-direction: row;
        margin-top: 50px;
      }

      .controls {
        position: static;
        margin-top: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-line"></div>

    <a class="back-link" href="index.html">←</a>

    <svg class="flower flower-left" viewBox="0 0 100 100" aria-hidden="true">
      <ellipse cx="22" cy="26" rx="10" ry="20" fill="#8fd39b" transform="rotate(-50 22 26)"></ellipse>
      <ellipse cx="22" cy="58" rx="10" ry="20" fill="#8fd39b" transform="rotate(40 22 58)"></ellipse>
      <circle cx="54" cy="42" r="13" fill="#f4c4b8"></circle>
      <circle cx="42" cy="30" r="13" fill="#f7d0c7"></circle>
      <circle cx="67" cy="30" r="13" fill="#f7d0c7"></circle>
      <circle cx="42" cy="55" r="13" fill="#f7d0c7"></circle>
      <circle cx="67" cy="55" r="13" fill="#f7d0c7"></circle>
      <circle cx="54" cy="42" r="6" fill="#f2f0c6"></circle>
    </svg>

    <svg class="flower flower-right" viewBox="0 0 100 100" aria-hidden="true">
      <ellipse cx="78" cy="26" rx="10" ry="20" fill="#8fd39b" transform="rotate(50 78 26)"></ellipse>
      <ellipse cx="78" cy="58" rx="10" ry="20" fill="#8fd39b" transform="rotate(-40 78 58)"></ellipse>
      <circle cx="46" cy="42" r="13" fill="#f4c4b8"></circle>
      <circle cx="34" cy="30" r="13" fill="#f7d0c7"></circle>
      <circle cx="59" cy="30" r="13" fill="#f7d0c7"></circle>
      <circle cx="34" cy="55" r="13" fill="#f7d0c7"></circle>
      <circle cx="59" cy="55" r="13" fill="#f7d0c7"></circle>
      <circle cx="46" cy="42" r="6" fill="#f2f0c6"></circle>
    </svg>

    <div class="controls">
      <button onclick="lagOppgave()">Ny oppgave</button>
      <button onclick="window.print()">Skriv ut</button>
    </div>

    <div id="mainTitle" class="ruteord title-pill"></div>
    <div id="subTitle" class="ruteord subtitle-pill"></div>

    <div class="pemdas-wrap">
      <div class="pemdas-letters">
        <div class="p-red">P</div>
        <div class="e-peach">E</div>
        <div class="m-blue">M</div>
        <div class="d-blue">D</div>
        <div class="a-green">A</div>
        <div class="s-green">S</div>
      </div>

      <div class="pemdas-text">
        <div>Parenteser</div>
        <div>Eksponenter</div>
        <div>Multiplikasjon</div>
        <div>Divisjon</div>
        <div>Addisjon</div>
        <div>Subtraksjon</div>
      </div>
    </div>

    <div id="taskTitle" class="ruteord task-title"></div>

    <div class="task-area">
      <div id="oppgave"></div>
    </div>
  </div>

  <script>
    function settRuteord(id, tekst) {
      const el = document.getElementById(id);
      el.innerHTML = "";
      for (const tegn of tekst) {
        const span = document.createElement("span");
        span.innerHTML = tegn === " " ? "&nbsp;" : tegn;
        el.appendChild(span);
      }
    }

    function tilfeldigTall(min, maks) {
      return Math.floor(Math.random() * (maks - min + 1)) + min;
    }

    function tilfeldigFra(liste) {
      return liste[Math.floor(Math.random() * liste.length)];
    }

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function lagTryggDivisjon() {
      const divisor = tilfeldigTall(2, 9);
      const svar = tilfeldigTall(2, 12);
      return {
        tekst: `${divisor * svar} : ${divisor}`,
        verdi: svar
      };
    }

    function lagTryggEksponent() {
      const base = tilfeldigTall(2, 4);
      const exp = tilfeldigTall(2, 3);
      return {
        html: `<span class="pow"><span class="base">${base}</span><span class="exp">${exp}</span></span>`,
        tekst: `${base}^${exp}`,
        verdi: base ** exp
      };
    }

    function byggParentesUttrykk() {
      const deler = [];

      if (Math.random() < 0.75) {
        const e = lagTryggEksponent();
        deler.push({ type: "html", html: e.html, verdi: e.verdi });
      } else {
        deler.push({ type: "tekst", tekst: String(tilfeldigTall(2, 12)), verdi: null });
      }

      if (Math.random() < 0.7) {
        deler.push({ type: "tekst", tekst: tilfeldigFra([" + ", " - "]), verdi: null });
        deler.push({ type: "tekst", tekst: String(tilfeldigTall(2, 12)), verdi: null });
      }

      if (Math.random() < 0.8) {
        const operator = tilfeldigFra([" · ", " : "]);
        deler.push({ type: "tekst", tekst: operator, verdi: null });

        if (operator.trim() === ":") {
          const d = lagTryggDivisjon();
          deler.push({ type: "tekst", tekst: `(${d.tekst})`, verdi: null });
        } else {
          deler.push({ type: "tekst", tekst: String(tilfeldigTall(2, 9)), verdi: null });
        }
      }

      let html = "(";
      deler.forEach(del => {
        html += del.type === "html" ? del.html : del.tekst;
      });
      html += ")";

      return html;
    }

    function lagUttrykk() {
      const deler = [];

      deler.push(byggParentesUttrykk());

      const muligeOperasjoner = shuffle([" + ", " - ", " · ", " : "]).slice(0, tilfeldigTall(2, 3));

      for (const op of muligeOperasjoner) {
        deler.push(op);

        if (op.trim() === ":") {
          const d = lagTryggDivisjon();
          deler.push(d.tekst);
        } else if (op.trim() === "·" && Math.random() < 0.4) {
          const e = lagTryggEksponent();
          deler.push(e.html);
        } else {
          deler.push(String(tilfeldigTall(2, 12)));
        }
      }

      return deler;
    }

    function lagOppgave() {
      const container = document.getElementById("oppgave");
      const uttrykk = lagUttrykk();

      let html = `<div class="expr">`;
      for (const del of uttrykk) {
        html += `<span class="token">${del}</span>`;
      }
      html += `<span class="answer-equals">=</span>`;
      html += `</div>`;

      container.innerHTML = html;
    }

    settRuteord("mainTitle", "Helt Nils lekser");
    settRuteord("subTitle", "Regnerekkefølge");
    settRuteord("taskTitle", "Oppgave 1");

    lagOppgave();
  </script>
</body>
</html>
