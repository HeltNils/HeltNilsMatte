<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helt Nils lekser Nivå 3</title>
  <style>
    :root {
      --cell: 38px;
      --grid-line: rgba(0, 0, 0, 0.12);
      --paper: #f7f6f1;
      --ink: #111;
    }

    body {
      margin: 0;
      background: #e9e9e9;
      display: flex;
      justify-content: center;
      padding: 20px;
      font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
    }

    .page {
      width: 1180px;
      min-height: 930px;
      box-sizing: border-box;
      padding: 70px 80px 60px;
      background-color: var(--paper);
      background-image:
        linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
      background-size: var(--cell) var(--cell);
      position: relative;
    }

    .top-line {
      position: absolute;
      left: 0;
      right: 0;
      top: 68px;
      border-top: 2px solid #222;
    }

    .flower {
      position: absolute;
      font-size: 42px;
      line-height: 1;
    }

    .flower.left {
      top: 78px;
      left: 48px;
    }

    .flower.right {
      top: 66px;
      right: 48px;
    }

    .controls {
      position: absolute;
      top: 20px;
      right: 24px;
      display: flex;
      gap: 10px;
      z-index: 5;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 1rem;
      cursor: pointer;
      background: #333;
      color: white;
      font-family: inherit;
    }

    button:hover {
      opacity: 0.92;
    }

    .highlight-word {
      display: inline-flex;
      align-items: center;
      gap: 0;
      padding: 4px 18px 6px;
      border-radius: 18px;
      font-size: 2.05rem;
      line-height: 1;
      letter-spacing: 0.34em;
      color: var(--ink);
      white-space: nowrap;
    }

    .title-main {
      background: rgba(124, 151, 223, 0.65);
      margin-top: 52px;
      margin-bottom: 28px;
      min-width: 780px;
    }

    .title-small {
      background: rgba(124, 151, 223, 0.65);
      margin-bottom: 52px;
    }

    .green { background: rgba(208, 226, 100, 0.78); }
    .purple { background: rgba(205, 118, 224, 0.78); }
    .pink { background: rgba(241, 158, 145, 0.78); }
    .yellow { background: rgba(236, 232, 107, 0.82); }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 160px;
      row-gap: 95px;
      margin-top: 18px;
      padding: 0 10px 0 4px;
    }

    .section-title {
      margin-bottom: 34px;
    }

    .problem-wrap {
      min-height: 130px;
      padding-left: 40px;
    }

    .equation {
      display: flex;
      align-items: center;
      gap: 18px;
      font-size: 2rem;
      color: var(--ink);
      flex-wrap: wrap;
    }

    .operator,
    .equals {
      font-size: 2.2rem;
      line-height: 1;
    }

    .answer-line {
      display: inline-block;
      width: 110px;
      border-bottom: 2px solid #111;
      height: 0.9em;
      vertical-align: middle;
    }

    .fraction {
      display: inline-grid;
      grid-template-rows: auto auto auto;
      justify-items: center;
      align-items: center;
      min-width: 34px;
      line-height: 1;
    }

    .fraction .top,
    .fraction .bottom {
      font-size: 2rem;
      padding: 0 4px;
    }

    .fraction .bar {
      width: 100%;
      min-width: 34px;
      border-top: 2px solid #111;
      margin: 2px 0 3px;
    }

    .footer {
      margin-top: 85px;
      font-size: 1rem;
      color: #444;
    }

    @media print {
      body {
        background: white;
        padding: 0;
      }

      .controls {
        display: none;
      }

      .page {
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-line"></div>
    <div class="flower left">🌸</div>
    <div class="flower right">🌸</div>

    <div class="controls">
      <button onclick="lagOppgaver()">Lag nye oppgaver</button>
      <button onclick="window.print()">Skriv ut</button>
    </div>

    <div id="mainTitle" class="highlight-word title-main"></div>
    <div id="brokTitle" class="highlight-word title-small"></div>

    <div class="grid">
      <div class="section">
        <div id="titleAddisjon" class="highlight-word section-title green"></div>
        <div class="problem-wrap" id="addisjon"></div>
      </div>

      <div class="section">
        <div id="titleSubtraksjon" class="highlight-word section-title purple"></div>
        <div class="problem-wrap" id="subtraksjon"></div>
      </div>

      <div class="section">
        <div id="titleMultiplikasjon" class="highlight-word section-title pink"></div>
        <div class="problem-wrap" id="multiplikasjon"></div>
      </div>

      <div class="section">
        <div id="titleDivisjon" class="highlight-word section-title yellow"></div>
        <div class="problem-wrap" id="divisjon"></div>
      </div>
    </div>

    <div class="footer">
      Navn: ____________________________ &nbsp;&nbsp;&nbsp; Dato: __________________
    </div>
  </div>

  <script>
    function tilfeldigTall(min, maks) {
      return Math.floor(Math.random() * (maks - min + 1)) + min;
    }

    function gcd(a, b) {
      while (b !== 0) {
        [a, b] = [b, a % b];
      }
      return Math.abs(a);
    }

    function settRuteord(id, tekst) {
      const el = document.getElementById(id);
      el.textContent = tekst;
    }

    function lagBrokHTML(teller, nevner) {
      return `
        <span class="fraction">
          <span class="top">${teller}</span>
          <span class="bar"></span>
          <span class="bottom">${nevner}</span>
        </span>
      `;
    }

    function lagOppgaveHTML(b1, operator, b2) {
      return `
        <div class="equation">
          ${lagBrokHTML(b1.teller, b1.nevner)}
          <span class="operator">${operator}</span>
          ${lagBrokHTML(b2.teller, b2.nevner)}
          <span class="equals">=</span>
          <span class="answer-line"></span>
        </div>
      `;
    }

    function tilfeldigBrok(minNevner = 2, maksNevner = 12) {
      let nevner = tilfeldigTall(minNevner, maksNevner);
      let teller = tilfeldigTall(1, nevner - 1);

      while (gcd(teller, nevner) !== 1) {
        nevner = tilfeldigTall(minNevner, maksNevner);
        teller = tilfeldigTall(1, nevner - 1);
      }

      return { teller, nevner };
    }

    function sammenlignBrok(a, b) {
      return a.teller * b.nevner - b.teller * a.nevner;
    }

    function lagAddisjon() {
      const b1 = tilfeldigBrok(2, 12);
      const b2 = tilfeldigBrok(2, 12);
      document.getElementById("addisjon").innerHTML = lagOppgaveHTML(b1, "+", b2);
    }

    function lagSubtraksjon() {
      let b1 = tilfeldigBrok(2, 12);
      let b2 = tilfeldigBrok(2, 12);

      while (sammenlignBrok(b1, b2) <= 0) {
        b1 = tilfeldigBrok(2, 12);
        b2 = tilfeldigBrok(2, 12);
      }

      document.getElementById("subtraksjon").innerHTML = lagOppgaveHTML(b1, "-", b2);
    }

    function lagMultiplikasjon() {
      const b1 = tilfeldigBrok(2, 12);
      const b2 = tilfeldigBrok(2, 12);
      document.getElementById("multiplikasjon").innerHTML = lagOppgaveHTML(b1, "·", b2);
    }

    function lagDivisjon() {
      const b1 = tilfeldigBrok(2, 12);
      let b2 = tilfeldigBrok(2, 12);

      while (b2.teller === 0) {
        b2 = tilfeldigBrok(2, 12);
      }

      document.getElementById("divisjon").innerHTML = lagOppgaveHTML(b1, ":", b2);
    }

    function lagOppgaver() {
      lagAddisjon();
      lagSubtraksjon();
      lagMultiplikasjon();
      lagDivisjon();
    }

    settRuteord("mainTitle", "Helt Nils lekser Nivå 3");
    settRuteord("brokTitle", "Brøk");
    settRuteord("titleAddisjon", "Addisjon");
    settRuteord("titleSubtraksjon", "Subtraksjon");
    settRuteord("titleMultiplikasjon", "Multiplikasjon");
    settRuteord("titleDivisjon", "Divisjon");

    lagOppgaver();
  </script>
</body>
</html>
